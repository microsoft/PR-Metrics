---
name: Release ‚Äì Initiate

on:
  workflow_dispatch: null

permissions: {}

defaults:
  run:
    shell: pwsh

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
    steps:
      - name: Checkout ‚Äì Action
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          sparse-checkout: .github/actions

      - name: App Token ‚Äì Mint
        id: app-token
        uses: ./.github/actions/mint-github-app-token
        with:
          azure-client-id: ${{ vars.AZURE_CLIENT_ID }}
          azure-tenant-id: ${{ vars.AZURE_TENANT_ID }}
          azure-subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          key-vault-name: ${{ vars.KEY_VAULT_NAME }}
          key-vault-key-name: ${{ vars.KEY_VAULT_KEY_NAME }}
          permissions: '{"contents":"write","pull_requests":"write"}'

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          token: ${{ steps.app-token.outputs.token }}

      - name: gh ‚Äì Log Version
        run: gh --version

      - name: Version Number ‚Äì Read
        run: |-
          $release = Get-Content -Path '.github/release-version.json' -Raw | ConvertFrom-Json
          $major = [int] $release.major
          $minor = [int] $release.minor
          $patch = [int] $release.patch
          "major=$major" >> $Env:GITHUB_ENV
          "minor=$minor" >> $Env:GITHUB_ENV
          "patch=$patch" >> $Env:GITHUB_ENV
          "version=$major.$minor.$patch" >> $Env:GITHUB_ENV

      - name: Version Number ‚Äì Update
        run: >-
          .github/workflow-scripts/Update-Version.ps1
          -Major $env:major
          -Minor $env:minor
          -Patch $env:patch

      - name: Version Number ‚Äì release-publish-trigger.txt
        run: Set-Content -Path '.github/release-publish-trigger.txt' -Value $env:version

      - name: Git ‚Äì Create Branch
        run: git checkout -b release/v$env:version

      - name: Git ‚Äì Add Changed Files
        run: git add -A

      - name: Git ‚Äì Commit & Push (Signed)
        uses: grafana/github-api-commit-action@b1d81091e8480dd11fcea8bc1f0ab977a0376ca5 # v1.0.0
        with:
          commit-message: "feat: release v${{ env.version }}"
          create-branch-on-remote: true
          stage-all-files: true
          token: ${{ steps.app-token.outputs.token }}

      - name: Git ‚Äì Sync Local with Remote
        run: |-
          git fetch origin release/v$env:version
          git reset --hard origin/release/v$env:version

      - name: PR ‚Äì Create
        run: >-
          gh pr create
          --title "[Autogenerated] Release v$env:version with Package Updates"
          --body "Autogenerated release for PR Metrics v$env:version. This includes version updates and dependency updates."
          --label "release"
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.13.0

      - name: npm ‚Äì Install Dependencies
        run: npm ci

      - name: npm ‚Äì Update Package Versions
        run: npm run update:versions

      - name: npm ‚Äì Update Transitive Dependencies
        run: npm run update:dependencies

      - name: Git ‚Äì Commit & Push (Signed)
        uses: grafana/github-api-commit-action@b1d81091e8480dd11fcea8bc1f0ab977a0376ca5 # v1.0.0
        with:
          commit-message: "chore: update dependencies"
          create-branch-on-remote: true
          stage-all-files: true
          token: ${{ steps.app-token.outputs.token }}

      - name: Git ‚Äì Sync Local with Remote
        run: |-
          git fetch origin release/v$env:version
          git reset --hard origin/release/v$env:version
