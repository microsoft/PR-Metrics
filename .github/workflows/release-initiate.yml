---
name: Release – Initiate

on:
  workflow_dispatch: null

permissions: {}

defaults:
  run:
    shell: pwsh

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout – Action
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          sparse-checkout: .github/actions

      - name: App Token – Mint
        id: app-token
        uses: ./.github/actions/mint-github-app-token
        with:
          azure-client-id: ${{ vars.AZURE_CLIENT_ID }}
          azure-tenant-id: ${{ vars.AZURE_TENANT_ID }}
          azure-subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          permissions: '{"contents":"write","pull_requests":"write"}'

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          token: ${{ steps.app-token.outputs.token }}

      - name: gh – Log Version
        run: gh --version

      - name: Version Number – Read
        run: |-
          $release = Get-Content -Path '.github/release-version.json' -Raw | ConvertFrom-Json
          $major = [int] $release.major
          $minor = [int] $release.minor
          $patch = [int] $release.patch
          "major=$major" >> $Env:GITHUB_ENV
          "minor=$minor" >> $Env:GITHUB_ENV
          "patch=$patch" >> $Env:GITHUB_ENV
          "version=$major.$minor.$patch" >> $Env:GITHUB_ENV

      - name: Version Number – Update
        run: >-
          .github/workflow-scripts/Update-Version.ps1
          -Major $env:major
          -Minor $env:minor
          -Patch $env:patch

      - name: Version Number – release-publish-trigger.txt
        run: Set-Content -Path '.github/release-publish-trigger.txt' -Value $env:version

      - name: Git – Create Branch
        run: git checkout -b release/v$env:version

      - name: Git – Add Changed Files
        run: git add -A

      - name: Git – Commit & Push (Signed)
        uses: grafana/github-api-commit-action@b1d81091e8480dd11fcea8bc1f0ab977a0376ca5 # v1.0.0
        with:
          commit-message: "feat: release v${{ env.version }}"
          create-branch-on-remote: true
          stage-all-files: true
          token: ${{ steps.app-token.outputs.token }}

      - name: Git – Sync Local with Remote
        run: |-
          git fetch origin release/v$env:version
          git reset --hard origin/release/v$env:version

      - name: PR – Create
        run: >-
          gh pr create
          --title "[Autogenerated] Release v$env:version with Package Updates"
          --body "Autogenerated release for PR Metrics v$env:version. This includes version updates and dependency updates."
          --label "release"
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: PR – Comment
        run: |-
          $body = @'
          **Action required before merging**

          Check out this branch, then run the GitHub Copilot CLI agent:

          ```bash
          copilot --agent refresh-ci-dependencies --prompt "Refresh the pinned CI/CD dependencies on this release branch."
          ```

          This updates SHA-pinned GitHub Actions, Azure DevOps task versions, and Node.js runtime consistency – the pins the automated dependency updates do not cover – then commits and pushes to this branch. See `.github/agents/refresh-ci-dependencies.agent.md`.
          '@
          gh pr comment "release/v$env:version" --body $body
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.13.0

      - name: npm – Install Dependencies
        run: npm ci

      - name: npm – Update Package Versions
        run: npm run update:versions

      - name: npm – Update Transitive Dependencies
        run: npm run update:dependencies

      - name: Git – Commit & Push (Signed)
        uses: grafana/github-api-commit-action@b1d81091e8480dd11fcea8bc1f0ab977a0376ca5 # v1.0.0
        with:
          commit-message: "chore: update dependencies"
          create-branch-on-remote: true
          stage-all-files: true
          token: ${{ steps.app-token.outputs.token }}

      - name: Git – Sync Local with Remote
        run: |-
          git fetch origin release/v$env:version
          git reset --hard origin/release/v$env:version
