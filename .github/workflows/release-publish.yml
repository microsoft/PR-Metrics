---
name: Release – Publish

on:
  push:
    branches:
      - main
    paths:
      - .github/release-publish-trigger.txt
  workflow_dispatch: null

permissions: {}

defaults:
  run:
    shell: pwsh

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    environment: production
    permissions:
      attestations: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: App Token – Mint
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: Iv23lilx6AekMDUze7ss
          permission-contents: write
          permission-discussions: write
          private-key: ${{ secrets.PRIVATE_KEY }}

      - name: gh – Log Version
        run: gh --version

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.13.0

      - name: npm – Install Dependencies
        run: npm ci

      - name: npm – Build Release
        run: npm run build:release

      - name: npm – Generate SBOM
        run: npm sbom --sbom-format cyclonedx --sbom-type library > "${{ github.workspace }}/ms-omex.PRMetrics.sbom.cdx.json"

      - name: Release – Create
        run: npx tfx-cli extension create --manifest-globs vss-extension.json --output-path ../ms-omex.PRMetrics.vsix
        working-directory: ${{ github.workspace }}/release

      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: ${{ github.workspace }}/ms-omex.PRMetrics.vsix

      - name: cosign – Install
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: cosign – Sign VSIX
        run: >-
          cosign sign-blob --yes
          --bundle "${{ github.workspace }}/ms-omex.PRMetrics.vsix.sigstore.json"
          "${{ github.workspace }}/ms-omex.PRMetrics.vsix"

      - name: Release – Publish
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ms-omex.PRMetrics
          path: |
            ${{ github.workspace }}/ms-omex.PRMetrics.vsix
            ${{ github.workspace }}/ms-omex.PRMetrics.vsix.sigstore.json
            ${{ github.workspace }}/ms-omex.PRMetrics.sbom.cdx.json

      - name: Get Version
        id: version
        run: |-
          $version = Get-Content -Path '.github/release-publish-trigger.txt'
          "VERSION=v$version" >> $Env:GITHUB_OUTPUT

      - name: Generate Release Notes
        run: >-
          gh api repos/${{ github.repository }}/releases/generate-notes
          -f tag_name="$env:VERSION"
          -f target_commitish=${{ github.sha }}
          --jq '.body' > release-notes.md
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          VERSION: ${{ steps.version.outputs.VERSION }}

      - name: GitHub Release
        run: >-
          gh release create "$env:VERSION"
          "${{ github.workspace }}/ms-omex.PRMetrics.vsix"
          "${{ github.workspace }}/ms-omex.PRMetrics.vsix.sigstore.json"
          "${{ github.workspace }}/ms-omex.PRMetrics.sbom.cdx.json"
          --title "Release $env:VERSION"
          --target "${{ github.sha }}"
          --notes-file release-notes.md
          --discussion-category "Releases"
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          VERSION: ${{ steps.version.outputs.VERSION }}
