---
name: Release – Publish

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/support/release-publish-trigger.txt
  workflow_dispatch: null

permissions: {}

defaults:
  run:
    shell: pwsh

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      attestations: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: gh – Log Version
        run: gh --version

      - name: Install Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20.20.0

      - name: npm – Install Dependencies
        run: npm ci

      - name: npm – Build Release
        run: npm run build:release

      - name: npm – Generate SBOM
        run: npm sbom --sbom-format cyclonedx --sbom-type library > "${{ github.workspace }}/ms-omex.PRMetrics.sbom.cdx.json"

      - name: Release – Create
        run: npx tfx-cli extension create --manifest-globs vss-extension.json --output-path ../ms-omex.PRMetrics.vsix
        working-directory: ${{ github.workspace }}/release

      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: ${{ github.workspace }}/ms-omex.PRMetrics.vsix

      - name: cosign – Install
        uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22 # v4.1.0

      - name: cosign – Sign VSIX
        run: >-
          cosign sign-blob --yes
          --bundle "${{ github.workspace }}/ms-omex.PRMetrics.vsix.sigstore.json"
          "${{ github.workspace }}/ms-omex.PRMetrics.vsix"

      - name: Release – Publish
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ms-omex.PRMetrics
          path: |
            ${{ github.workspace }}/ms-omex.PRMetrics.vsix
            ${{ github.workspace }}/ms-omex.PRMetrics.vsix.sigstore.json
            ${{ github.workspace }}/ms-omex.PRMetrics.sbom.cdx.json

      - name: Get Version
        id: version
        run: |-
          $version = Get-Content -Path '.github/workflows/support/release-publish-trigger.txt'
          "VERSION=v$version" >> $Env:GITHUB_OUTPUT

      - name: Generate Release Notes
        run: >-
          gh api repos/${{ github.repository }}/releases/generate-notes
          -f tag_name="${{ steps.version.outputs.VERSION }}"
          -f target_commitish=${{ github.sha }}
          --jq '.body' > release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.PR_METRICS_TOKEN }}

      - name: GitHub Release
        run: >-
          gh release create "${{ steps.version.outputs.VERSION }}"
          "${{ github.workspace }}/ms-omex.PRMetrics.vsix"
          "${{ github.workspace }}/ms-omex.PRMetrics.vsix.sigstore.json"
          "${{ github.workspace }}/ms-omex.PRMetrics.sbom.cdx.json"
          --title "Release ${{ steps.version.outputs.VERSION }}"
          --target "${{ github.sha }}"
          --notes-file release-notes.md
          --discussion-category "Releases"
        env:
          GITHUB_TOKEN: ${{ secrets.PR_METRICS_TOKEN }}
