---
name: Mint GitHub App Token
description: >-
  Authenticates to Azure via OIDC, signs a GitHub App JWT using the App's
  private key stored in Azure Key Vault, and exchanges the JWT for an
  installation token. The private key never leaves Key Vault.

inputs:
  client-id:
    description: GitHub App client ID.
    required: true
  installation-id:
    description: GitHub App installation ID on the target repository.
    required: true
  azure-client-id:
    description: Entra ID client ID of the federated identity.
    required: true
  azure-tenant-id:
    description: Azure tenant ID.
    required: true
  azure-subscription-id:
    description: Azure subscription containing the Key Vault.
    required: true
  keyvault-name:
    description: Azure Key Vault holding the App's private key.
    required: true
  keyvault-key-name:
    description: Name of the App's RSA key inside the Key Vault.
    required: true

outputs:
  token:
    description: GitHub App installation token (one-hour lifetime).
    value: ${{ steps.mint.outputs.token }}

runs:
  using: composite
  steps:
    - name: Azure – Login (OIDC)
      uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
      with:
        client-id: ${{ inputs.azure-client-id }}
        tenant-id: ${{ inputs.azure-tenant-id }}
        subscription-id: ${{ inputs.azure-subscription-id }}

    - name: Mint Installation Token
      id: mint
      shell: pwsh
      env:
        CLIENT_ID: ${{ inputs.client-id }}
        INSTALLATION_ID: ${{ inputs.installation-id }}
        KV_NAME: ${{ inputs.keyvault-name }}
        KEY_NAME: ${{ inputs.keyvault-key-name }}
      run: ${{ github.action_path }}/Mint-AppToken.ps1
