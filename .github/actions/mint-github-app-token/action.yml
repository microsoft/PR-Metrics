---
name: Mint GitHub App Token
description: >-
  Mints a short-lived microsoft-pr-metrics installation token by signing the App
  JWT in Azure Key Vault, so the App private key is never stored in GitHub.

inputs:
  azure-client-id:
    description: Client ID of the Azure identity federated to GitHub OIDC.
    required: true
  azure-tenant-id:
    description: Azure tenant ID.
    required: true
  azure-subscription-id:
    description: Azure subscription ID.
    required: true
  permissions:
    description: >-
      JSON object of installation-token permissions, for example
      '{"contents":"write"}'.
    required: true

outputs:
  token:
    description: The minted GitHub App installation access token.
    value: ${{ steps.mint.outputs.token }}

runs:
  using: composite
  steps:
    - name: Azure – Sign-in
      uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
      with:
        client-id: ${{ inputs.azure-client-id }}
        tenant-id: ${{ inputs.azure-tenant-id }}
        subscription-id: ${{ inputs.azure-subscription-id }}

    - name: App Token – Mint
      id: mint
      shell: pwsh
      run: '& "$Env:GITHUB_ACTION_PATH/New-GitHubAppToken.ps1"'
      env:
        GITHUB_APP_PERMISSIONS: ${{ inputs.permissions }}
